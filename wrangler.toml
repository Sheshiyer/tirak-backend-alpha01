name = "tirak-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Tirak backend Cloudflare account. Keep this pinned so Wrangler cannot deploy
# this Worker against a personal or Tirak Plus account by accident.
account_id = "2c0c96c68f0ee73b6d980054557bca5b"

# Development environment (default)
[env.development]
name = "tirak-backend-dev"

# Staging environment
[env.staging]
name = "tirak-backend-staging"

# Production environment
[env.production]
name = "tirak-backend-production"

# D1 Database bindings
[[d1_databases]]
binding = "DB"
database_name = "tirak-development"
database_id = "60443346-c480-4975-962e-bd4daf4a37a8"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "tirak-staging"
database_id = "5132c8cc-8f23-4dd2-94d1-9d53edb92888"

[[env.production.d1_databases]]
binding = "DB"
database_name = "tirak-mobile-production"
database_id = "e17982a4-d4e0-47ae-bc24-3c88c4003a4c"

# R2 Storage bindings
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-dev"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-staging"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-production"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "29c134656fca4bada93e1c3b5313b3fa"

[[kv_namespaces]]
binding = "SESSIONS"
id = "486126fb5afb41feb30458231bde3a96"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "ff06486f6291490f83c1864d812ef7f8"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "6f29f29cd08d4920aa3cc35577377270"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "26bb0a8431db448daef5be2f050a3898"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "c4f5ac76aa6043aaa8566f6b70e59204"

# Queue bindings
[[queues.producers]]
binding = "MODERATION_QUEUE"
queue = "tirak-moderation-dev"

[[queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "tirak-analytics-dev"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "tirak-notification-dev"

[[env.staging.queues.producers]]
binding = "MODERATION_QUEUE"
queue = "tirak-moderation-staging"

[[env.staging.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "tirak-analytics-staging"

[[env.staging.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "tirak-notification-staging"

[[env.production.queues.producers]]
binding = "MODERATION_QUEUE"
queue = "tirak-moderation-production"

[[env.production.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "tirak-analytics-production"

[[env.production.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "tirak-notification-production"

# Queue consumers
[[queues.consumers]]
queue = "tirak-moderation-dev"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-moderation-dlq-dev"

[[queues.consumers]]
queue = "tirak-analytics-dev"
max_batch_size = 50
max_batch_timeout = 60
max_retries = 3
dead_letter_queue = "tirak-analytics-dlq-dev"

[[queues.consumers]]
queue = "tirak-notification-dev"
max_batch_size = 20
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-notification-dlq-dev"

[[env.staging.queues.consumers]]
queue = "tirak-moderation-staging"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-moderation-dlq-staging"

[[env.staging.queues.consumers]]
queue = "tirak-analytics-staging"
max_batch_size = 50
max_batch_timeout = 60
max_retries = 3
dead_letter_queue = "tirak-analytics-dlq-staging"

[[env.staging.queues.consumers]]
queue = "tirak-notification-staging"
max_batch_size = 20
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-notification-dlq-staging"

[[env.production.queues.consumers]]
queue = "tirak-moderation-production"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-moderation-dlq-production"

[[env.production.queues.consumers]]
queue = "tirak-analytics-production"
max_batch_size = 50
max_batch_timeout = 60
max_retries = 3
dead_letter_queue = "tirak-analytics-dlq-production"

[[env.production.queues.consumers]]
queue = "tirak-notification-production"
max_batch_size = 20
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "tirak-notification-dlq-production"

# Durable Objects
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "NOTIFICATION_SERVICE"
class_name = "NotificationService"

[[env.staging.durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[env.staging.durable_objects.bindings]]
name = "NOTIFICATION_SERVICE"
class_name = "NotificationService"

[[env.production.durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[env.production.durable_objects.bindings]]
name = "NOTIFICATION_SERVICE"
class_name = "NotificationService"

# Durable Object migrations
[[migrations]]
tag = "v1"
new_classes = ["ChatRoom", "NotificationService"]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "NotificationService"]

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "NotificationService"]

# Transactional email. Configure the Tirak sending domain in Cloudflare Email
# Service, then restrict senders once noreply/support addresses are verified.
[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@tirak.app"]

[[env.staging.send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@tirak.app"]

[[env.production.send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@tirak.app"]

# Environment variables (secrets will be set via wrangler secret)
[vars]
ENVIRONMENT = "development"
PAYMENT_MODE = "disabled"
PROMPTPAY_ENABLED = "false"
FRONTEND_URLS = "http://localhost:3000,http://localhost:5173"
JWT_SECRET = "dev-jwt-secret-change-in-production"
EMAIL_PROVIDER = "cloudflare"
EMAIL_FROM = "noreply@tirak.app"
EMAIL_FROM_NAME = "Tirak"
EMAIL_REPLY_TO = "support@tirak.app"

[env.staging.vars]
ENVIRONMENT = "staging"
PAYMENT_MODE = "disabled"
PROMPTPAY_ENABLED = "false"
FRONTEND_URLS = "https://staging.tirak.app"
EMAIL_PROVIDER = "cloudflare"
EMAIL_FROM = "noreply@tirak.app"
EMAIL_FROM_NAME = "Tirak"
EMAIL_REPLY_TO = "support@tirak.app"

[env.production.vars]
ENVIRONMENT = "production"
PAYMENT_MODE = "disabled"
PROMPTPAY_ENABLED = "false"
FRONTEND_URLS = "https://tirak.app,https://www.tirak.app"
EMAIL_PROVIDER = "cloudflare"
EMAIL_FROM = "noreply@tirak.app"
EMAIL_FROM_NAME = "Tirak"
EMAIL_REPLY_TO = "support@tirak.app"
