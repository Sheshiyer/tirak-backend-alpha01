# Durable Objects
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "NOTIFICATION_SERVICE"
class_name = "NotificationService"

# Durable Object migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "NotificationService"]

# Environment variables (secrets will be set via wrangler secret)
[vars]
ENVIRONMENT = "development"
FRONTEND_URLS = "http://localhost:3000,http://localhost:5173"
JWT_SECRET = "dev-jwt-secret-change-in-production"

[env.staging.vars]
ENVIRONMENT = "staging"
FRONTEND_URLS = "https://staging.tirak.app"
JWT_SECRET = "staging-jwt-secret"

[env.production.vars]
ENVIRONMENT = "production"
FRONTEND_URLS = "https://tirak.app,https://www.tirak.app"
JWT_SECRET = "production-jwt-secret"
