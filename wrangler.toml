account_id = "2c0c96c68f0ee73b6d980054557bca5b"
name = "tirak-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Development environment (default)
[env.development]
name = "tirak-backend-dev"

# Staging environment
[env.staging]
name = "tirak-backend-staging"

# Production environment
[env.production]
name = "tirak-backend-production"

# D1 Database bindings
[[d1_databases]]
binding = "DB"
database_name = "tirak-main"
database_id = "fe94000d-ef78-4059-ba2c-23a638909b27"
preview_database_id = "fe94000d-ef78-4059-ba2c-23a638909b27" # Using same DB for preview

[[env.staging.d1_databases]]
binding = "DB"
database_name = "tirak-main"
database_id = "fe94000d-ef78-4059-ba2c-23a638909b27"

[[env.production.d1_databases]]
binding = "DB"
database_name = "tirak-main"
database_id = "fe94000d-ef78-4059-ba2c-23a638909b27"

# R2 Storage bindings
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-dev"
preview_bucket_name = "tirak-storage-dev" # Using same bucket for preview

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-staging"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "tirak-storage-production"

# KV Namespaces
[[kv_namespaces]]
binding = "CACHE"
id = "29c134656fca4bada93e1c3b5313b3fa"
preview_id = "d841c52982cb4ae3917975bdd1061ce0"

[[kv_namespaces]]
binding = "SESSIONS"
id = "486126fb5afb41feb30458231bde3a96"
preview_id = "9ed9fe2729284248ac99e3acc6b4f029"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "placeholder-cache-staging-id"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-sessions-staging-id"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "placeholder-cache-production-id"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-sessions-production-id"

